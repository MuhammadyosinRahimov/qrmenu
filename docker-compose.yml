version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: qrmenu-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: qrmenu
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qrmenu-api
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5079
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=qrmenu;Username=postgres;Password=root
      - Jwt__SecretKey=QrMenuSecretKey12345678901234567890
      - Jwt__Issuer=QrMenu
      - Jwt__Audience=QrMenuApp
      - Jwt__ExpirationHours=24
      - App__BaseUrl__0=http://localhost:3000
      - App__BaseUrl__1=http://localhost:3001
      - OsonSms__Token=cc32eedb58a4166aa400974df4ada2c6
      - OsonSms__Login=yalla
      - OsonSms__Sender=Yalla
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5079/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5
    ports:
      - "5079:5079"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_images:/app/wwwroot/images

volumes:
  postgres_data:
  backend_images:
